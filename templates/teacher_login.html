<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>老师登录｜知否</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, Arial;
            background: #f5f6f7;
        }

        .container {
            width: 420px;
            margin: 80px auto;
            background: white;
            border-radius: 12px;
            padding: 36px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .msg {
            color: #d33;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }

        .input {
            width: 100%;
            height: 38px;
            padding: 0 16px;
            border-radius: 8px;
            border: 1px solid #e1e5eb;
            background: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }

        .code-box {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .code-box input {
            flex: 1;
        }

        .code-box button {
            width: 100px;
            height: 38px;
            border-radius: 8px;
            border: none;
            background: #e5e6eb;
            font-size: 13px;
            cursor: pointer;
        }

        .submit {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #3fd29a, #2bb673);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
{% include "_search_header.html" %}

<div class="container">
    <h2>老师登录</h2>
    {% if message %}<div class="msg">{{ message }}</div>{% endif %}
    <form method="post" action="/teacher-login">
        <input class="input" id="teacherLoginPhone" type="text" name="phone" placeholder="手机号" required>
        <div class="code-box">
            <input class="input" id="teacherLoginCode" type="text" name="code" placeholder="验证码" required>
            <button id="teacherLoginSendBtn" type="button">获取验证码</button>
        </div>
        <div class="msg" id="teacherLoginStatus"></div>
        <button type="submit" class="submit">登录</button>
    </form>
</div>

<script>
document.getElementById("teacherLoginSendBtn").addEventListener("click", async () => {
    const phone = document.getElementById("teacherLoginPhone").value.trim();
    const status = document.getElementById("teacherLoginStatus");
    if (!phone) {
        status.textContent = "请先填写手机号";
        return;
    }
    status.textContent = "发送中...";
    try {
        const form = new URLSearchParams();
        form.set("phone", phone);
        form.set("purpose", "teacher_login");
        const res = await fetch("/send-code", { method: "POST", body: form });
        const data = await res.json();
        if (data.ok) {
            status.textContent = `演示验证码：${data.code}（10分钟有效）`;
        } else {
            status.textContent = data.message || "发送失败";
        }
    } catch (e) {
        status.textContent = "发送失败，请检查服务";
    }
});
</script>
</body>
</html>
