<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>演示流程｜知否</title>
    <style>
        body { margin:0; font-family:-apple-system,BlinkMacSystemFont,Arial; background:#f5f6f7; color:#222; }
        .container { width: 960px; margin: 40px auto; background:#fff; border-radius:12px; padding:28px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
        h1 { margin:0 0 16px; font-size:22px; }
        .section { margin-top:18px; }
        .step { background:#f8fafc; border:1px solid #eef0f4; border-radius:10px; padding:14px; margin-top:10px; }
        .title { font-weight:600; }
        .note { color:#6b7280; font-size:13px; margin-top:6px; }
    </style>
</head>
<body>
{% include "_search_header.html" %}
<div class="container">
    <h1>演示流程（1分钟内）</h1>

    <div class="section">
        <div class="title">学生侧</div>
        <div class="step">1. 注册/登录 → 2. 选专业/老师 → 3. 提问 → 4. 支付 → 5. 聊天收到回复</div>
        <div class="note">演示重点：转化路径清晰、支付后进入聊天闭环</div>
    </div>

    <div class="section">
        <div class="title">老师侧</div>
        <div class="step">1. 注册 → 2. 审核通过 → 3. 登录 → 4. 收到消息 → 5. 回复学生</div>
        <div class="note">演示重点：审核机制、消息入口、回复能力</div>
    </div>

    <div class="section">
        <div class="title">建议截图清单</div>
        <div class="step">首页、专业列表、老师列表、提问页、支付页、聊天页、老师注册、老师消息页</div>
    </div>
</div>
</body>
</html>
