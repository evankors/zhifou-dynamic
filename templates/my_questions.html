<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的提问｜知否</title>
    <style>
        body { margin:0; font-family:-apple-system,BlinkMacSystemFont,Arial; background:#f5f6f7; color:#222; }
        .container { width: 960px; margin: 40px auto; background:#fff; border-radius:12px; padding:24px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
        h1 { margin:0 0 16px; font-size:22px; }
        table { width:100%; border-collapse:collapse; font-size:14px; }
        th, td { text-align:left; padding:10px 8px; border-bottom:1px solid #eee; }
        .status { font-weight:600; }
        .link { color:#2f9f6f; text-decoration:none; font-weight:600; }
    </style>
</head>
<body>
{% include "_search_header.html" %}

<div class="container">
    <h1>我的提问</h1>
    <table>
        <thead>
            <tr>
                <th>问题</th>
                <th>老师</th>
                <th>状态</th>
                <th>时间</th>
                <th>进入</th>
            </tr>
        </thead>
        <tbody>
        {% if not questions %}
            <tr><td colspan="5">暂无提问记录</td></tr>
        {% endif %}
        {% for q in questions %}
            <tr>
                <td>{{ q['question'] }}</td>
                <td>{{ q['teacher_name'] }}</td>
                <td class="status">{{ q['status'] }}</td>
                <td>{{ q['created_at'] }}</td>
                <td><a class="link" href="/chat?order_id={{ q['id'] }}">查看</a></td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
