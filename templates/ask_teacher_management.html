<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>管理学老师｜问老师</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, Arial;
            background: #f5f6f7;
        }

        .container {
            width: 100%;
            margin: 40px 0;
            padding: 0 24px;
            box-sizing: border-box;
        }

        h1 {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 26px;
        }

        .teacher-list {
            background: #fff;
            border-radius: 10px;
            padding: 10px 30px;
        }

        .teacher-item {
            display: flex;
            align-items: center;
            padding: 22px 0;
            border-bottom: 1px solid #eee;
        }

        .teacher-item:last-child {
            border-bottom: none;
        }

        .avatar {
            display: none;
        }

        .teacher-info {
            flex: 1;
        }

        .teacher-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .teacher-meta {
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
        }

        .teacher-stats {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
        }

        .teacher-stats span {
            margin-right: 14px;
        }

        .teacher-tags span {
            display: inline-block;
            font-size: 12px;
            color: #3dbb7f;
            border: 1px solid #3dbb7f;
            padding: 3px 10px;
            border-radius: 14px;
            margin-right: 6px;
            margin-top: 4px;
        }

        .teacher-action {
            text-align: right;
            min-width: 140px;
        }

        .teacher-price {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .ask-btn {
            border: 1px solid #3dbb7f;
            color: #3dbb7f;
            padding: 8px 18px;
            border-radius: 18px;
            cursor: pointer;
            background: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .ask-btn:hover {
            background: #3dbb7f;
            color: #fff;
        }
    </style>
</head>
<body>
{% include "_search_header.html" %}

<div class="container">
    <h1>{{ major_title }} · 可咨询老师</h1>
    <div class="subtitle">{{ major_desc }}</div>

    <div class="teacher-list">
        {% if not teachers %}
        <div style="padding:20px;color:#666;">暂无已审核通过的老师</div>
        {% endif %}
        {% for teacher in teachers %}
            <div class="teacher-item">
        <div style="position:relative;"></div>

            <div class="teacher-info">
                <div class="teacher-name">{{ teacher.name }}</div>
                <div class="teacher-meta">{{ teacher.school }} · {{ teacher.title }}</div>
                <div class="teacher-stats">
                    <span>{{ teacher.major }}</span>
                </div>
            </div>

            <div class="teacher-action">
                <div class="teacher-price">¥{{ teacher.price }}</div>
                <a class="ask-btn" href="/teacher-profile/{{ teacher.id }}">问老师</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
