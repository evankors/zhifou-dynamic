<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>关键指标｜知否</title>
    <style>
        :root {
            --ink: #0f172a;
            --muted: #64748b;
            --card: #ffffff;
            --bg: #f6f8fb;
            --accent: #16a34a;
            --accent-2: #0ea5e9;
            --accent-3: #f59e0b;
        }
        body {
            margin: 0;
            font-family: "IBM Plex Sans", "Avenir Next", "Helvetica Neue", sans-serif;
            background: radial-gradient(1200px 600px at 20% -10%, #eef2ff, var(--bg));
            color: var(--ink);
        }
        .page {
            width: 1080px;
            margin: 36px auto 64px;
        }
        .hero {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .hero h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: .6px;
        }
        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-top: 6px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }
        .metric {
            background: var(--card);
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            border: 1px solid #eef2f7;
        }
        .metric .label {
            color: var(--muted);
            font-size: 12px;
        }
        .metric .value {
            font-size: 26px;
            font-weight: 700;
            margin-top: 8px;
        }
        .metric .trend {
            font-size: 12px;
            margin-top: 8px;
            color: var(--accent);
        }
        .section {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
        }
        .card {
            background: var(--card);
            border-radius: 14px;
            padding: 18px;
            border: 1px solid #eef2f7;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
        }
        .card h2 {
            margin: 0 0 14px;
            font-size: 16px;
        }
        .bars {
            display: grid;
            gap: 10px;
        }
        .bar-row {
            display: grid;
            grid-template-columns: 110px 1fr 48px;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: var(--muted);
        }
        .bar {
            height: 10px;
            border-radius: 999px;
            background: #e2e8f0;
            overflow: hidden;
        }
        .bar span {
            display: block;
            height: 100%;
            border-radius: 999px;
        }
        .bar .a { background: var(--accent); }
        .bar .b { background: var(--accent-2); }
        .bar .c { background: var(--accent-3); }
        .small-list {
            margin: 0;
            padding-left: 18px;
            font-size: 13px;
            color: var(--muted);
        }
    </style>
</head>
<body>
{% include "_search_header.html" %}
<div class="page">
    <div class="hero">
        <div>
            <h1>关键指标看板</h1>
            <div class="subtitle">示例数据用于路演展示，可替换为真实运营数据</div>
        </div>
        <div class="subtitle">最近更新：今日 12:00</div>
    </div>

    <div class="grid">
        <div class="metric">
            <div class="label">今日新增用户</div>
            <div class="value">128</div>
            <div class="trend">▲ 18% vs 昨日</div>
        </div>
        <div class="metric">
            <div class="label">今日提问数</div>
            <div class="value">76</div>
            <div class="trend">▲ 12% vs 昨日</div>
        </div>
        <div class="metric">
            <div class="label">付费转化率</div>
            <div class="value">18.5%</div>
            <div class="trend">▲ 2.1pt</div>
        </div>
        <div class="metric">
            <div class="label">平均响应时间</div>
            <div class="value">2.4h</div>
            <div class="trend">▼ 0.6h</div>
        </div>
    </div>

    <div class="section">
        <div class="card">
            <h2>专业热度分布</h2>
            <div class="bars">
                <div class="bar-row"><div>管理学</div><div class="bar"><span class="a" style="width:78%"></span></div><div>78%</div></div>
                <div class="bar-row"><div>心理学</div><div class="bar"><span class="b" style="width:56%"></span></div><div>56%</div></div>
                <div class="bar-row"><div>计算机</div><div class="bar"><span class="c" style="width:49%"></span></div><div>49%</div></div>
                <div class="bar-row"><div>教育学</div><div class="bar"><span class="a" style="width:42%"></span></div><div>42%</div></div>
                <div class="bar-row"><div>经济学</div><div class="bar"><span class="b" style="width:38%"></span></div><div>38%</div></div>
            </div>
        </div>
        <div class="card">
            <h2>增长亮点</h2>
            <ul class="small-list">
                <li>老师审核通过率 82%</li>
                <li>复购率 21%</li>
                <li>高峰期响应 < 1 小时</li>
                <li>高价值用户占比 14%</li>
            </ul>
        </div>
    </div>
</div>
</body>
</html>
