<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }}｜知否</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, Arial;
            background: #f5f6f7;
            color: #222;
        }

        .container {
            width: 900px;
            margin: 56px auto;
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 10px rgba(0,0,0,.06);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 24px;
        }

        .list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .item {
            background: #f8f9fb;
            border: 1px solid #eceff3;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 15px;
        }

        .back {
            margin-top: 24px;
            display: inline-block;
            text-decoration: none;
            color: #3dbb7f;
            border: 1px solid #3dbb7f;
            border-radius: 18px;
            padding: 8px 14px;
            font-size: 14px;
        }
    </style>
</head>
<body>
{% include "_search_header.html" %}
<div class="container">
    <h1>{{ page.title }}</h1>
    <div class="subtitle">{{ page.subtitle }}</div>
    <div class="list">
        {% for journal in journals %}
            <div class="item">{{ loop.index }}. {{ journal }}</div>
        {% endfor %}
    </div>
    <a class="back" href="/">返回首页</a>
</div>
</body>
</html>
