<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>老师注册｜知否</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, Arial;
            background: #f5f6f7;
        }

        .container {
            width: 520px;
            margin: 60px auto;
            background: #fff;
            border-radius: 12px;
            padding: 36px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .msg {
            color: #2f9f6f;
            font-size: 13px;
            margin-bottom: 12px;
            text-align: center;
        }

        .input {
            width: 100%;
            height: 38px;
            padding: 0 16px;
            border-radius: 8px;
            border: 1px solid #e1e5eb;
            background: #fff;
            font-size: 14px;
            box-sizing: border-box;
            margin-top: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .code-box {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            align-items: stretch;
        }

        .code-box input {
            flex: 1;
            margin-top: 0;
        }

        .code-box button {
            width: 100px;
            height: 38px;
            border-radius: 8px;
            border: none;
            background: #e5e6eb;
            font-size: 13px;
            cursor: pointer;
        }

        .submit {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: linear-gradient(90deg, #3fd29a, #2bb673);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>教师注册</h2>
    {% if message %}<div class="msg">{{ message }}</div>{% endif %}
    <form method="post" action="/register-teacher">
        <input class="input" type="text" name="name" placeholder="姓名" required>
        <div class="row">
            <input class="input" type="text" name="school" placeholder="学校" required>
            <input class="input" type="text" name="title" placeholder="职称" required>
        </div>
        <div class="row">
            <select class="input" name="major" required>
                <option value="">选择专业方向</option>
                {% for m in majors %}
                <option value="{{ m['name'] }}">{{ m['name'] }}</option>
                {% endfor %}
            </select>
            <input class="input" type="text" name="price" placeholder="咨询价格（元/每次）" required>
        </div>
        <input class="input" id="teacherPhone" type="text" name="phone" placeholder="手机号" required>
        <div class="code-box">
            <input class="input" id="teacherCode" type="text" name="code" placeholder="验证码" required>
            <button id="teacherSendBtn" type="button">获取验证码</button>
        </div>
        <div class="msg" id="teacherStatus"></div>
        <button type="submit" class="submit">提交申请</button>
    </form>
</div>

<script>
document.getElementById("teacherSendBtn").addEventListener("click", async () => {
    const phone = document.getElementById("teacherPhone").value.trim();
    const status = document.getElementById("teacherStatus");
    if (!phone) {
        status.textContent = "请先填写手机号";
        return;
    }
    status.textContent = "发送中...";
    try {
        const form = new URLSearchParams();
        form.set("phone", phone);
        form.set("purpose", "teacher_register");
        const res = await fetch("/send-code", { method: "POST", body: form });
        const data = await res.json();
        if (data.ok) {
            status.textContent = `演示验证码：${data.code}（10分钟有效）`;
        } else {
            status.textContent = data.message || "发送失败";
        }
    } catch (e) {
        status.textContent = "发送失败，请检查服务";
    }
});
</script>
</body>
</html>
